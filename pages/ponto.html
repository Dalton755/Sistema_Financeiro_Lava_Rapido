<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Ponto</title>

<link rel="stylesheet"
href="../css/style.css">

</head>

<body>

<nav class="bottom-nav">

  <a href="../index.html">

    <span class="icon">
      🏠
    </span>

    Home

  </a>

  <a
    href="ponto.html"
    class="active">

    <span class="icon">
      ⏱️
    </span>

    Ponto

  </a>

  <a href="adiantamentos.html">

    <span class="icon">
      💵
    </span>

    Adiant.

  </a>

  <a href="fechamento.html">

    <span class="icon">
      📋
    </span>

    Fech.

  </a>

  <a href="pagamentos.html">

    <span class="icon">
      💰
    </span>

    Pagto

  </a>

</nav>

<div class="container">

  <h2>Lançamento Diário</h2>

  <label>Data</label>

  <input
    type="date"
    id="data">

  <br><br>

  <div
    id="mensagem"
    style="
      display:none;
      padding:10px;
      margin:10px 0;
      border-radius:6px;
      background:#d4edda;
      color:#155724;
    ">
  </div>

  <div
    id="cardsLojas"
    class="cards-lojas">

  </div>
  </div>

  <div
  id="overlayPontosLoja"
  class="overlay"
  style="display:none;">

  <div
    class="bottom-sheet">

    <button
      class="btn-fechar"
      onclick="
        document
          .getElementById(
            'overlayPontosLoja'
          )
          .style.display='none'
      ">

      ✕

    </button>

    <h3
      id="tituloPontosLoja">

    </h3>

    <div
      id="listaPontosLoja">

    </div>

  </div>

</div>

<div
  id="overlay"
  class="overlay">

  <div
    id="formularioPonto"
    class="bottom-sheet">

    <button
      type="button"
      class="btn-fechar"
      onclick="fecharFormulario()">

      ✕

    </button>

    <h3>
      Novo Lançamento
    </h3>

    <label>
      Funcionário
    </label>

    <input
      type="text"
      id="nomeFuncionarioBusca"
      list="listaFuncionariosModal"
      placeholder="Digite o nome">

    <datalist
      id="listaFuncionariosModal">
    </datalist>

    <input
      type="hidden"
      id="funcionarioId">

    <br><br>

    <label>
      Loja
    </label>

    <input
      type="text"
      id="lojaTrabalho"
      readonly>

    <br><br>

    <label>
      Escala
    </label>

    <select id="escala">

      <option value="">
        Selecione
      </option>

      <option value="07-16">
        07-16
      </option>

      <option value="08-17">
        08-17
      </option>

      <option value="12-20">
        12-20
      </option>

      <option value="14-21">
        14-21
      </option>

    </select>

    <br><br>

    <label>
      Entrada
    </label>

    <input
      type="time"
      id="entrada">

    <br><br>

    <label>
      Saída Almoço
    </label>

    <input
      type="time"
      id="saidaAlmoco">

    <br><br>

    <label>
      Retorno Almoço
    </label>

    <input
      type="time"
      id="retornoAlmoco">

    <br><br>

    <label>
      Saída
    </label>

    <input
      type="time"
      id="saida">

    <br><br>

    <label>
      Horas
    </label>

    <input
      type="number"
      id="horas"
      readonly>

    <br><br>

    <button
      id="btnSalvarPonto"
      onclick="salvarPonto()">

      💾 Salvar

    </button>

  </div>

</div>

<script
src="../js/config.js">
</script>

<script
src="../js/api.js">
</script>

<script
src="../js/ponto.js">
</script>

</body>

</html>
