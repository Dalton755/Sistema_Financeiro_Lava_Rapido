<body>

<div class="container">

<h2>Lançamento Diário</h2>

<label>Data</label>

<input
type="date"
id="data">

<br><br>

<label>Loja</label>

<select id="loja">
</select>


<br><br>

<label>
Funcionário
</label>

<input
  type="text"
  id="buscaFuncionario"
  list="listaFuncionarios"
  placeholder="Digite o nome">

<datalist
  id="listaFuncionarios">
</datalist>

<br><br>


  <button
  id="btnNovoLancamento"
  onclick="abrirPorBusca()">

  ➕ Novo Lançamento

</button>

<div id="resumo"></div>

  <div
  id="mensagem"
  style="
    display:none;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    background:#d4edda;
    color:#155724;
  ">
</div>

<hr>

<h3>
🔎 Filtros
</h3>

<label>
Funcionário
</label>

<input
  type="text"
  id="filtroFuncionario"
  placeholder="Digite o nome">

<br><br>

<label>
Loja
</label>

<select
  id="filtroLoja">

  <option value="">
    Todas
  </option>

</select>

<br><br>
  
<div id="lancados"></div>
  <hr>

<div
  id="overlay"
  class="overlay">

  <div
    id="formularioPonto"
    class="bottom-sheet">

  <h3 id="nomeFuncionario"></h3>

    <button
  type="button"
  class="btn-fechar"
  onclick="fecharFormulario()">

  ✕

</button>

  <input
    type="hidden"
    id="funcionarioId">

  <label>Escala</label>

  <select id="escala">

    <option value="">
      Selecione
    </option>

    <option value="07-16">
      07-16
    </option>

    <option value="08-17">
      08-17
    </option>

    <option value="12-20">
      12-20
    </option>

    <option value="14-21">
      14-21
    </option>

  </select>

  <br><br>

  <label>Entrada</label>
  <input type="time" id="entrada">

  <br><br>

  <label>Saída Almoço</label>
  <input type="time" id="saidaAlmoco">

  <br><br>

  <label>Retorno Almoço</label>
  <input type="time" id="retornoAlmoco">

  <br><br>

  <label>Saída</label>
  <input type="time" id="saida">

  <br><br>

  <label>Horas</label>
  <input
    type="number"
    id="horas"
    readonly>

  <br><br>

  <button
    id="btnSalvarPonto"
    onclick="salvarPonto()">

    Salvar

  </button>

</div>

</div>

<script
src="../js/config.js">
</script>

<script
src="../js/api.js">
</script>

<script
src="../js/ponto.js">
</script>

</body>

</html>
